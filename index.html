<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Recorder</title>
    <link rel="icon" type="image/png" href="assets/img/icon-capturadora.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="modern-bg">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-sm-12">
                <div class="card shadow modern-card border-0 rounded-4">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 main-title">Recolector de Señas</h3>
                        
                        <h4 id="recordingStatus" class="recording-status d-none text-danger fw-bold text-center mb-2">¡GRABANDO!</h4>

                        <div class="video-container bg-dark rounded-3 mb-3 position-relative overflow-hidden">
                            <video id="cameraPreview" autoplay muted playsinline class="w-100 h-100 object-fit-cover"></video>
                            <video id="recordedPreview" controls class="w-100 h-100 object-fit-cover d-none"></video>
                            
                            <div id="cameraStats" class="position-absolute top-0 start-0 m-3 badge camera-stats d-none">
                                📹 Cargando...
                            </div>

                            <div id="preCountdownOverlay" class="position-absolute top-50 start-50 translate-middle text-white fw-bold countdown-overlay pre-countdown d-none"></div>
                            <div id="recordCountdownOverlay" class="position-absolute bottom-0 end-0 m-3 text-white fw-bold countdown-overlay record-countdown d-none"></div>
                        </div>

                        <div class="d-flex justify-content-end mb-3">
                            <button id="btnSwitchCamera" class="btn btn-outline-secondary btn-custom">Cambiar Cámara</button>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label for="inputPersona" class="form-label">Persona</label>
                                <input type="text" id="inputPersona" class="form-control" placeholder="ej. persona1" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="inputSena" class="form-label">Seña</label>
                                <input type="text" id="inputSena" class="form-control" placeholder="ej. dolor-de-cabeza" required>
                            </div>
                            <div class="col-6 col-md-3">
                                <label for="inputNumero" class="form-label">Número</label>
                                <input type="number" id="inputNumero" class="form-control" min="1" value="1" required>
                            </div>
                            <div class="col-6 col-md-3">
                                <label for="inputDuracion" class="form-label">Duración</label>
                                <select id="inputDuracion" class="form-select">
                                    <option value="3">3s</option>
                                    <option value="4">4s</option>
                                    <option value="5" selected>5s</option>
                                    <option value="6">6s</option>
                                    <option value="7">7s</option>
                                    <option value="8">8s</option>
                                    <option value="9">9s</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex flex-wrap justify-content-center gap-3 mb-4" id="recordControls">
                            <button id="btnRecord" class="btn btn-danger fw-bold btn-custom">Grabar (5s)</button>
                        </div>
                        
                        <div class="d-flex flex-wrap justify-content-center gap-3 mb-4 d-none" id="previewControls">
                            <button id="btnDelete" class="btn btn-outline-danger btn-custom">Eliminar</button>
                            <button id="btnDownloadLocal" class="btn btn-primary fw-bold btn-custom">Descarga Local</button>
                            <button id="btnDownload" class="btn btn-success fw-bold btn-custom">Subir a Drive</button>
                            <button id="btnNextRecord" class="btn btn-dark fw-bold btn-custom">Grabar Siguiente</button>
                        </div>

                        <hr>

                        <div class="d-flex flex-wrap justify-content-center gap-3">
                            <button id="btnNewSign" class="btn btn-outline-primary btn-custom">Nueva Seña</button>
                            <button id="btnNewPerson" class="btn btn-outline-dark btn-custom">Persona Nueva</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="camera.js"></script>
    <script src="recorder.js"></script>
    <script src="app.js"></script>
</body>
</html>
