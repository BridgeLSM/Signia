<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Recorder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-12">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Recolector de Señas</h3>
                        
                        <div class="video-container bg-dark rounded-3 mb-3 position-relative overflow-hidden">
                            <video id="cameraPreview" autoplay muted playsinline class="w-100 h-100 object-fit-cover"></video>
                            <video id="recordedPreview" controls class="w-100 h-100 object-fit-cover d-none"></video>
                            <div id="countdownOverlay" class="position-absolute top-50 start-50 translate-middle text-white fw-bold d-none"></div>
                        </div>

                        <div class="d-flex justify-content-end mb-3">
                            <button id="btnSwitchCamera" class="btn btn-outline-secondary btn-sm">Cambiar Cámara</button>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <label for="inputPersona" class="form-label">Persona</label>
                                <input type="text" id="inputPersona" class="form-control" placeholder="ej. persona1" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="inputSena" class="form-label">Seña</label>
                                <input type="text" id="inputSena" class="form-control" placeholder="ej. dolor-de-cabeza" required>
                            </div>
                            <div class="col-6 col-md-3">
                                <label for="inputNumero" class="form-label">Número</label>
                                <input type="number" id="inputNumero" class="form-control" min="1" value="1" required>
                            </div>
                            <div class="col-6 col-md-3">
                                <label for="inputDuracion" class="form-label">Duración</label>
                                <select id="inputDuracion" class="form-select">
                                    <option value="5" selected>5s</option>
                                    <option value="6">6s</option>
                                    <option value="7">7s</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-4" id="recordControls">
                            <button id="btnRecord" class="btn btn-danger px-4 py-2 fw-bold">Grabar (5s)</button>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-4 d-none" id="previewControls">
                            <button id="btnDelete" class="btn btn-outline-danger px-4">Eliminar</button>
                            <button id="btnDownload" class="btn btn-success px-4">Descargar</button>
                        </div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <button id="btnNewSign" class="btn btn-outline-primary btn-sm">Nueva Seña</button>
                            <button id="btnNewPerson" class="btn btn-outline-dark btn-sm">Persona Nueva</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="camera.js"></script>
    <script src="recorder.js"></script>
    <script src="app.js"></script>
</body>
</html>
